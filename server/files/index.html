<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {
                    // Parse JSON movies array from server
                    const movies = JSON.parse(xhr.responseText);

                    // Loop through each movie
                    movies.forEach(movie => {
                        // Single main container (no double wrapping!)
                        const main = document.createElement('main');
                        main.className = 'movie-main';

                        main.innerHTML = `
        <article class="movie-card" aria-labelledby="title-${movie.Title.replace(/[^a-zA-Z0-9]/g, '')}">
            <!-- Poster -->
            <figure class="poster-wrapper">
                <img src="${movie.Poster}" alt="${movie.Title} poster" class="poster" loading="lazy">
                <figcaption class="sr-only">Poster image for ${movie.Title}</figcaption>
            </figure>

            <!-- Header -->
            <header>
                <h1 id="title-${movie.Title.replace(/[^a-zA-Z0-9]/g, '')}" class="movie-title">${movie.Title}</h1>
                <div class="movie-meta">
                    <time datetime="${movie.Released}">📅 ${movie.Released}</time>
                    <span aria-label="Runtime">⏱️ ${movie.Runtime}min</span>
                    <span class="rating" aria-label="IMDb ${movie.imdbRating}/10">⭐ ${movie.imdbRating}</span>
                </div>
            </header>

            <!-- Plot -->
            <section aria-label="Plot summary">
                <p class="plot">${movie.Plot}</p>
            </section>

            <!-- Genres -->
            <section aria-label="Genres">
                <ul class="genres" role="list">
                    ${movie.Genres.map(g => `<li class="genre-tag">${g}</li>`).join('')}
                </ul>
            </section>

            <!-- Credits -->
            <aside aria-label="Production credits">
                <dl class="credits-section">
                    <div>
                        <dt>Directors</dt>
                        <dd>${movie.Directors.join(', ')}</dd>
                    </div>
                    <div>
                        <dt>Writers</dt>
                        <dd>${movie.Writers.join(', ')}</dd>
                    </div>
                    <div>
                        <dt>Actors</dt>
                        <dd>${movie.Actors.slice(0, 3).join(', ')}${movie.Actors.length > 3 ? ' et al.' : ''}</dd>
                    </div>
                    <div>
                        <dt>Metascore</dt>
                        <dd>${movie.Metascore}</dd>
                    </div>
                </dl>
            </aside>
        </article>
    `;

                        bodyElement.appendChild(main);  // Single append!
                    });


                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>
</body>

</html>
