<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        function reverseString(s) {
            return s.split("").reverse().join("");
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {
                    // Parse JSON movies array from server
                    const movies = JSON.parse(xhr.responseText);

                    // Loop through each movie
                    movies.forEach(movie => {
                        // Container for layout
                        const container = document.createElement('div');
                        container.className = 'container';

                        // Grid wrapper
                        const grid = document.createElement('div');
                        grid.className = 'movie-grid';

                        // Movie card with your CSS classes
                        const card = document.createElement('div');
                        card.className = 'movie-card';

                        card.innerHTML = `
        <img src="${movie.Poster}" alt="${movie.Title}" class="poster">
        <h1 class="movie-title">${movie.Title}</h1>
        <div class="movie-meta">
            <span>📅 ${movie.Released}</span>
            <span>⏱️ ${movie.Runtime}min</span>
            <span class="rating">⭐ ${movie.imdbRating}</span>
        </div>
        <p class="plot">${movie.Plot}</p>
        <div class="genres">
            ${movie.Genres.map(g => `<span class="genre-tag">${g}</span>`).join('')}
        </div>
        <div class="credits-section">
            <div class="credit-item">
                <div class="credit-label">Directors</div>
                <div class="credit-value">${movie.Directors.join(', ')}</div>
            </div>
            <div class="credit-item">
                <div class="credit-label">Writers</div>
                <div class="credit-value">${movie.Writers.join(', ')}</div>
            </div>
            <div class="credit-item">
                <div class="credit-label">Actors</div>
                <div class="credit-value">${movie.Actors.slice(0, 3).join(', ')}...</div>
            </div>
            <div class="credit-item">
                <div class="credit-label">Metascore</div>
                <div class="credit-value">${movie.Metascore}</div>
            </div>
        </div>
    `;

                        grid.appendChild(card);
                        container.appendChild(grid);
                        bodyElement.appendChild(container);
                    });

                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>
</body>

</html>
